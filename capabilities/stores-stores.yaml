naftiko: 1.0.0-alpha2
info:
  label: Best Buy Stores API — Stores
  description: 'Best Buy Stores API — Stores. 2 operations. Lead operation: Best Buy List Stores. Self-contained Naftiko capability
    covering one Best Buy business surface.'
  tags:
  - Best Buy
  - Stores
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BEST_BUY_API_KEY: BEST_BUY_API_KEY
capability:
  consumes:
  - type: http
    namespace: stores-stores
    baseUri: https://api.bestbuy.com/v1
    description: Best Buy Stores API — Stores business capability. Self-contained, no shared references.
    resources:
    - name: stores
      path: /stores
      operations:
      - name: liststores
        method: GET
        description: Best Buy List Stores
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: apiKey
          in: query
          type: string
          description: Your Best Buy developer API key.
          required: true
        - name: format
          in: query
          type: string
          description: Response format - json or xml.
        - name: show
          in: query
          type: string
          description: Comma-separated list of attributes to return.
        - name: area
          in: query
          type: string
          description: 'Search for stores near a location. Format: area(postalCode,radius) or area(latitude,longitude,radius).
            Default radius is 10 miles.'
        - name: pageSize
          in: query
          type: integer
          description: Number of results per page. Maximum 100.
        - name: page
          in: query
          type: integer
          description: Page number for pagination.
        - name: sort
          in: query
          type: string
          description: Sort attribute and direction, e.g. distance.asc.
    - name: stores-storeId
      path: /stores/{storeId}
      operations:
      - name: getstorebyid
        method: GET
        description: Best Buy Get Store by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: storeId
          in: path
          type: integer
          description: The unique Best Buy store identifier.
          required: true
        - name: apiKey
          in: query
          type: string
          description: Your Best Buy developer API key.
          required: true
        - name: format
          in: query
          type: string
          description: Response format - json or xml.
    authentication:
      type: apikey
      key: apiKey
      value: '{{env.BEST_BUY_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: stores-stores-rest
    port: 8080
    description: REST adapter for Best Buy Stores API — Stores. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/stores
      name: stores
      description: REST surface for stores.
      operations:
      - method: GET
        name: liststores
        description: Best Buy List Stores
        call: stores-stores.liststores
        with:
          apiKey: rest.apiKey
          format: rest.format
          show: rest.show
          area: rest.area
          pageSize: rest.pageSize
          page: rest.page
          sort: rest.sort
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/stores/{storeid}
      name: stores-storeid
      description: REST surface for stores-storeId.
      operations:
      - method: GET
        name: getstorebyid
        description: Best Buy Get Store by ID
        call: stores-stores.getstorebyid
        with:
          storeId: rest.storeId
          apiKey: rest.apiKey
          format: rest.format
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: stores-stores-mcp
    port: 9090
    transport: http
    description: MCP adapter for Best Buy Stores API — Stores. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: best-buy-list-stores
      description: Best Buy List Stores
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stores-stores.liststores
      with:
        apiKey: tools.apiKey
        format: tools.format
        show: tools.show
        area: tools.area
        pageSize: tools.pageSize
        page: tools.page
        sort: tools.sort
      outputParameters:
      - type: object
        mapping: $.
    - name: best-buy-get-store-id
      description: Best Buy Get Store by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stores-stores.getstorebyid
      with:
        storeId: tools.storeId
        apiKey: tools.apiKey
        format: tools.format
      outputParameters:
      - type: object
        mapping: $.
