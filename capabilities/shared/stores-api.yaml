naftiko: "1.0.0-alpha1"

info:
  label: "Best Buy Stores API"
  description: >-
    Retrieve store location and operational data for 1,587+ Best Buy locations
    with proximity search, hours, and services.
  tags:
    - Best Buy
    - Stores
    - Locations
    - Retail
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      BEST_BUY_API_KEY: BEST_BUY_API_KEY

capability:
  consumes:
    - type: http
      namespace: best-buy-stores
      baseUri: https://api.bestbuy.com/v1
      description: "Best Buy Stores API for location and operational data."
      authentication:
        type: apikey
        key: apiKey
        value: "{{BEST_BUY_API_KEY}}"
        placement: query
      resources:
        - name: stores
          path: /stores
          description: "Store location queries"
          operations:
            - name: list-stores
              method: GET
              description: "Query Best Buy store locations with proximity search"
              inputParameters:
                - name: area
                  in: query
                  type: string
                  required: false
                  description: "Proximity search - area(postalCode,radius) or area(lat,lng,radius)"
                - name: show
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated list of attributes to return"
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Number of results per page"
                - name: sort
                  in: query
                  type: string
                  required: false
                  description: "Sort attribute and direction"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-store-by-id
              method: GET
              description: "Get detailed information for a specific Best Buy store"
              inputParameters:
                - name: storeId
                  in: path
                  type: integer
                  required: true
                  description: "The unique Best Buy store identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: best-buy-stores-rest
      resources:
        - path: /v1/stores
          name: stores
          description: "Query Best Buy store locations"
          operations:
            - method: GET
              name: list-stores
              description: "List Best Buy stores with optional proximity search"
              call: "best-buy-stores.list-stores"
              with:
                area: "rest.area"
                pageSize: "rest.pageSize"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/stores/{storeId}
          name: store
          description: "Get a specific Best Buy store"
          operations:
            - method: GET
              name: get-store-by-id
              description: "Get store details by store ID"
              call: "best-buy-stores.get-store-by-id"
              with:
                storeId: "rest.storeId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: best-buy-stores-mcp
      transport: http
      tools:
        - name: list-stores
          description: "Find Best Buy store locations with optional proximity search by postal code or GPS coordinates"
          hints:
            readOnly: true
            openWorld: true
          call: "best-buy-stores.list-stores"
          with:
            area: "tools.area"
            pageSize: "tools.pageSize"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-store-by-id
          description: "Get detailed information for a specific Best Buy store by store ID"
          hints:
            readOnly: true
            openWorld: false
          call: "best-buy-stores.get-store-by-id"
          with:
            storeId: "tools.storeId"
          outputParameters:
            - type: object
              mapping: "$."
