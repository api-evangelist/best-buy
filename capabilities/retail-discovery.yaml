naftiko: 1.0.0-alpha2
info:
  label: Best Buy Retail Discovery
  description: Unified retail discovery workflow combining product search, store locator, and personalized recommendations.
    Designed for developers and partners building retail integrations, shopping apps, and e-commerce experiences. Combines
    the Products, Stores, and Recommendations APIs into a cohesive consumer-facing workflow for product discovery, inventory
    lookup, and personalized suggestions.
  tags:
  - Best Buy
  - Retail
  - Products
  - Stores
  - Recommendations
  - E-Commerce
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    BEST_BUY_API_KEY: BEST_BUY_API_KEY
capability:
  consumes:
  - type: http
    namespace: best-buy-products
    baseUri: https://api.bestbuy.com/v1
    description: Best Buy Products API for querying the product catalog.
    authentication:
      type: apikey
      key: apiKey
      value: '{{BEST_BUY_API_KEY}}'
      placement: query
    resources:
    - name: products
      path: /products
      description: Product catalog queries
      operations:
      - name: list-products
        method: GET
        description: Query the Best Buy product catalog with filtering and search
        inputParameters:
        - name: show
          in: query
          type: string
          required: false
          description: Comma-separated list of attributes to return
        - name: pageSize
          in: query
          type: integer
          required: false
          description: Number of results per page (max 100)
        - name: page
          in: query
          type: integer
          required: false
          description: Page number for pagination
        - name: sort
          in: query
          type: string
          required: false
          description: Sort attribute and direction
        - name: search
          in: query
          type: string
          required: false
          description: Keyword search across product attributes
        - name: format
          in: query
          type: string
          required: false
          description: Response format (json or xml)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-product-by-sku
        method: GET
        description: Retrieve a single product by SKU number
        inputParameters:
        - name: sku
          in: path
          type: integer
          required: true
          description: The Best Buy product SKU number
        - name: show
          in: query
          type: string
          required: false
          description: Comma-separated list of attributes to return
        - name: format
          in: query
          type: string
          required: false
          description: Response format (json or xml)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: best-buy-stores
    baseUri: https://api.bestbuy.com/v1
    description: Best Buy Stores API for location and operational data.
    authentication:
      type: apikey
      key: apiKey
      value: '{{BEST_BUY_API_KEY}}'
      placement: query
    resources:
    - name: stores
      path: /stores
      description: Store location queries
      operations:
      - name: list-stores
        method: GET
        description: Query Best Buy store locations with proximity search
        inputParameters:
        - name: area
          in: query
          type: string
          required: false
          description: Proximity search - area(postalCode,radius) or area(lat,lng,radius)
        - name: show
          in: query
          type: string
          required: false
          description: Comma-separated list of attributes to return
        - name: pageSize
          in: query
          type: integer
          required: false
          description: Number of results per page
        - name: sort
          in: query
          type: string
          required: false
          description: Sort attribute and direction
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-store-by-id
        method: GET
        description: Get detailed information for a specific Best Buy store
        inputParameters:
        - name: storeId
          in: path
          type: integer
          required: true
          description: The unique Best Buy store identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: best-buy-recommendations
    baseUri: https://api.bestbuy.com/v1
    description: Best Buy Recommendations API for behavior-based product suggestions.
    authentication:
      type: apikey
      key: apiKey
      value: '{{BEST_BUY_API_KEY}}'
      placement: query
    resources:
    - name: recommendations
      path: /products
      description: Product recommendation endpoints
      operations:
      - name: get-trending-products
        method: GET
        description: Top 10 products with highest view velocity (rolling 3-hour window)
        inputParameters:
        - name: categoryId
          in: query
          type: string
          required: false
          description: Filter to a specific category
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-most-viewed-products
        method: GET
        description: Top 10 most frequently viewed products (48-hour window)
        inputParameters:
        - name: categoryId
          in: query
          type: string
          required: false
          description: Filter to a specific category
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-also-viewed-products
        method: GET
        description: Products browsed alongside a specific SKU (30-day window)
        inputParameters:
        - name: sku
          in: path
          type: integer
          required: true
          description: SKU to get also-viewed recommendations for
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-also-bought-products
        method: GET
        description: Products purchased together with a specific SKU (30-day window)
        inputParameters:
        - name: sku
          in: path
          type: integer
          required: true
          description: SKU to get also-bought recommendations for
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: retail-discovery-api
    description: Unified REST API for Best Buy retail product discovery and store lookup.
    resources:
    - path: /v1/products
      name: products
      description: Search and browse the Best Buy product catalog
      operations:
      - method: GET
        name: list-products
        description: Search and filter Best Buy products with keyword search and attribute filtering
        call: best-buy-products.list-products
        with:
          search: rest.search
          pageSize: rest.pageSize
          page: rest.page
          sort: rest.sort
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/products/{sku}
      name: product
      description: Get a specific Best Buy product by SKU
      operations:
      - method: GET
        name: get-product
        description: Get detailed product information by SKU
        call: best-buy-products.get-product-by-sku
        with:
          sku: rest.sku
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/stores
      name: stores
      description: Find Best Buy stores near a location
      operations:
      - method: GET
        name: list-stores
        description: Find Best Buy stores with proximity search
        call: best-buy-stores.list-stores
        with:
          area: rest.area
          pageSize: rest.pageSize
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/stores/{storeId}
      name: store
      description: Get a specific Best Buy store
      operations:
      - method: GET
        name: get-store
        description: Get store details including hours and services
        call: best-buy-stores.get-store-by-id
        with:
          storeId: rest.storeId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/trending
      name: trending-products
      description: Get trending Best Buy products
      operations:
      - method: GET
        name: get-trending
        description: Get top trending products by view velocity
        call: best-buy-recommendations.get-trending-products
        with:
          categoryId: rest.categoryId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/products/{sku}/also-viewed
      name: also-viewed
      description: Get also-viewed product recommendations
      operations:
      - method: GET
        name: get-also-viewed
        description: Get products frequently viewed alongside this SKU
        call: best-buy-recommendations.get-also-viewed-products
        with:
          sku: rest.sku
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/products/{sku}/also-bought
      name: also-bought
      description: Get also-bought product recommendations
      operations:
      - method: GET
        name: get-also-bought
        description: Get products frequently purchased with this SKU
        call: best-buy-recommendations.get-also-bought-products
        with:
          sku: rest.sku
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: retail-discovery-mcp
    transport: http
    description: MCP server for AI-assisted Best Buy product discovery, store lookup, and recommendations.
    tools:
    - name: search-products
      description: Search the Best Buy product catalog by keyword, price range, or product attributes
      hints:
        readOnly: true
        openWorld: true
      call: best-buy-products.list-products
      with:
        search: tools.search
        pageSize: tools.pageSize
        page: tools.page
      outputParameters:
      - type: object
        mapping: $.
    - name: get-product
      description: Get detailed product information for a specific Best Buy SKU including price, availability, and specs
      hints:
        readOnly: true
        openWorld: false
      call: best-buy-products.get-product-by-sku
      with:
        sku: tools.sku
      outputParameters:
      - type: object
        mapping: $.
    - name: find-stores
      description: Find Best Buy stores near a location using postal code or GPS coordinates
      hints:
        readOnly: true
        openWorld: true
      call: best-buy-stores.list-stores
      with:
        area: tools.area
        pageSize: tools.pageSize
      outputParameters:
      - type: object
        mapping: $.
    - name: get-store
      description: Get hours, services, and contact information for a specific Best Buy store
      hints:
        readOnly: true
        openWorld: false
      call: best-buy-stores.get-store-by-id
      with:
        storeId: tools.storeId
      outputParameters:
      - type: object
        mapping: $.
    - name: get-trending-products
      description: Get the top trending Best Buy products by category or across the entire catalog
      hints:
        readOnly: true
        openWorld: true
      call: best-buy-recommendations.get-trending-products
      with:
        categoryId: tools.categoryId
      outputParameters:
      - type: object
        mapping: $.
    - name: get-most-viewed-products
      description: Get the most viewed Best Buy products in the last 48 hours
      hints:
        readOnly: true
        openWorld: true
      call: best-buy-recommendations.get-most-viewed-products
      with:
        categoryId: tools.categoryId
      outputParameters:
      - type: object
        mapping: $.
    - name: get-also-viewed-products
      description: Get products frequently viewed alongside a specific SKU for cross-sell discovery
      hints:
        readOnly: true
        openWorld: false
      call: best-buy-recommendations.get-also-viewed-products
      with:
        sku: tools.sku
      outputParameters:
      - type: object
        mapping: $.
    - name: get-also-bought-products
      description: Get products frequently purchased together with a specific SKU for bundle recommendations
      hints:
        readOnly: true
        openWorld: false
      call: best-buy-recommendations.get-also-bought-products
      with:
        sku: tools.sku
      outputParameters:
      - type: object
        mapping: $.
